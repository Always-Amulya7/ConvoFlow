<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Amulya's Automated Conferencing</title>
    <link rel="shortcut icon" href="./assets/MyImage.png" type="image/x-icon">
    <link rel='stylesheet' type='text/css' media='screen' href="/main.css">
</head>

<body>

    <h1>|| Auto Talk Meeting ||</h1>
    <div id="Connect">
        <div id="Video-Grid"></div>

        <div id="Chat-Box">
            <div id="chat-display"></div>
            <input type="text" id="chat-input" placeholder="Type a message">
            <button id="send-chat">Send</button>
        </div>

        <div id="Controls">
            <button id="Speak">Mic On</button>
            <button id="Video">Camera On</button>
            <button id="Quit">Leave Stream</button>
        </div>
    </div>

</body>
<script src="./AgoraRTC_N-4.22.1.js"></script>
<script src="/main.js"></script>

</html>
